<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a7cff">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Ventanas</title>

<style>

:root{
    --color-principal:#0a7cff;
    --color-precio:#000000;   /* ventas negras */
    --color-utilidad:#666;
    --color-fabricacion:#0a7cff;
    --fondo:#eef2f7;
}

body{
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:var(--fondo);
    margin:0;
}

/* ================= TITULO ================= */

h1{
    background:white;
    margin:0;
    padding:18px;
    text-align:center;
    font-size:22px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
    position:sticky;
    top:0;
}

/* ================= INPUTS ================= */

.inputs{
    display:flex;
    justify-content:center;
    gap:15px;
    padding:20px;
    flex-wrap:wrap;
}

input{
    padding:14px;
    font-size:18px;
    width:140px;
    border-radius:10px;
    border:2px solid #ddd;
    text-align:center;
}

/* ================= TARJETAS ================= */

.card{
    background:white;
    border-radius:16px;
    padding:18px;
    margin:14px;
    box-shadow:0 6px 18px rgba(0,0,0,.08);
    overflow:hidden; /* evita que el texto se salga */
}

.card h3{
    margin-top:0;
    color:var(--color-principal);
    border-bottom:2px solid #f1f1f1;
    padding-bottom:8px;
    font-size:20px; /* encabezados grandes */
    text-align:center;
}

/* ================= FILAS ================= */

.vidrio{
    display:grid;
    grid-template-columns: 25% 25% 25% 25%; /* EXACTO */
    align-items:center;
    border-bottom:1px solid #eee;
    font-size:15px;
}

/* celdas */
.vidrio div{
    text-align:center;
    padding:12px 6px;
    word-break:break-word;
    line-height:1.2;
}

/* lineas verticales */
.vidrio div:not(:last-child){
    border-right:1px solid #eee;
}

/* nombre vidrio */
.vidrio div:first-child{
    font-weight:600;
    font-size:15px;
}

/* ================= VALORES ================= */

.fabricacion{
    font-size:17px;
    font-weight:600;
    color:#163770;
}

.utilidad{
    font-size:17px;
    font-weight:600;
    color:#163770;
}

.precio{
    font-size:18px;
    font-weight:600;
    color:#1466c4;
}

/* ================= RESPONSIVE ================= */

@media (max-width:480px){

    .card{
        margin:10px;
        padding:14px;
    }

    .vidrio{
        font-size:14px;
    }

    .precio{
        font-size:17px;
    }
}

</style>
</head>

<body>

<h1>🪟 Calculadora de Ventanas</h1>

<div class="inputs">
<input id="ancho" type="number" placeholder="Ancho">
<input id="alto" type="number" placeholder="Alto">
</div>

<div id="contenedor"></div>

<script>

/* ===== FORMATO CLP ===== */

const CLP = n =>
 new Intl.NumberFormat('es-CL',{
  style:'currency',
  currency:'CLP',
  maximumFractionDigits:0
 }).format(n);

/* ===== NOMBRES ===== */

const nombresVentanas=[
"Linea 20 Mate",
"Linea 20 Bronce y Titaneo",
"Linea 20 Madera y blanco",
"Linea 25 Mate (Open Look)",
"Linea 25 Titaneo y Bronce (Open Look)",
"Linea 25 Madera y Blanco (Open Look)",
"Linea 25 Termo Mate (Cremona)",
"Linea 25 Termo Titaneo y Bronce (Cremona)",
"Linea 25 Termo Madera y Blanco (Cremona)"
];

/* ===== VIDRIOS ===== */

const vidrios=[
{nombre:"4mm incoloro",vidrio:6000},
{nombre:"4mm bronce",vidrio:8800},
{nombre:"5mm incoloro",vidrio:7300},
{nombre:"5mm bronce / espejo",vidrio:10700}
];

/* ===== CONFIG ===== */

const ventanas=[
{tipo:1,base:[2100,2100,2100,2100],fijo:12490},
{tipo:2,base:[2400,2300,2300,2300],fijo:12490},
{tipo:3,base:[2700,2600,2600,2600],fijo:12490},
{tipo:4,base:[2900,2900,2900,2900],fijo:14090},
{tipo:5,base:[3100,3100,3100,3100],fijo:14090},
{tipo:6,base:[3400,3400,3400,3400],fijo:14090},
{tipo:7,especial:true,base:2800,fijo:20890},
{tipo:8,especial:true,base:3000,fijo:20890},
{tipo:9,especial:true,base:3600,fijo:14090},
];

/* ===== CALCULOS ===== */

function vidrioNormal(a,h,base,precio){
return (a*4*base)+(h*6*base)+(a*h*precio);
}

function vidrioEspecial(t,a,h,base){
if(t==0)
return (a*4*base)+(h*6*base)+(a*h*6000)*2;

return (a*4*base)+(h*6*base)
+(a*h*6000)+(a*h*8800);
}

function quincalleria(tipo,a,h){

if(tipo<=3)
return (a*2*180)+(h*4*180)
+(a*4*30)+(h*6*30)
+(a+h*2)*150;

return (a*2*200)+(h*4*200)
+(a*4*40)+(h*6*40)
+(a+h*2)*200
+(tipo>=7?((a*4)+(h*4)*1000)+800:0);
}

/* ===== UI ===== */

const anchoInput=document.getElementById("ancho");
const altoInput=document.getElementById("alto");
const contenedor=document.getElementById("contenedor");

function calcular(){

const ancho=parseFloat(anchoInput.value)||0;
const alto=parseFloat(altoInput.value)||0;

contenedor.innerHTML="";

ventanas.forEach((v,index)=>{

let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<h3>${nombresVentanas[index]}</h3>
<div class="vidrio" style="font-weight:bold;border-bottom:2px solid #ddd;">
<div>Vidrio</div>
<div>Fabricación</div>
<div>Utilidad</div>
<div>Venta</div>
</div>`;

vidrios.forEach((vid,i)=>{

if(v.especial && i>1) return;

let vidrioCosto=v.especial
? vidrioEspecial(i,ancho,alto,v.base)
: vidrioNormal(ancho,alto,v.base[i],vid.vidrio);

let quin=quincalleria(v.tipo,ancho,alto);
let fabricacion=vidrioCosto+quin+v.fijo;
let venta=fabricacion*1.65;
let utilidad=venta-fabricacion;

let fila=document.createElement("div");
fila.className="vidrio";

fila.innerHTML = `
<div>${vid.nombre}</div>
<div class="fabricacion">${CLP(fabricacion)}</div>
<div class="utilidad">${CLP(utilidad)}</div>
<div class="precio">${CLP(venta)}</div>
`;

card.appendChild(fila);

});

contenedor.appendChild(card);

});

}

anchoInput.addEventListener("input",calcular);
altoInput.addEventListener("input",calcular);

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>
</body>
</html>
